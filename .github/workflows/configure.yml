name: Teedy CI Pipeline

# 触发条件：当代码推送到 main 或 master 分支，或者提交 PR 时触发
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest  # 在最新版本的 Ubuntu 环境下运行

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 JDK 环境 (Teedy项目通常使用JDK 11或17，这里以17为例)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven  # 开启Maven依赖缓存，加快构建速度

      # 3. Maven构建、PMD代码检查与运行测试
      # 注意：这里去掉了之前 Jenkins 中跳过 JavaDoc 的参数，让 Actions 正常生成文档
      - name: Build, PMD Check and Test with Maven
        run: mvn clean verify pmd:pmd -Dmaven.javadoc.skip=false

      # 4. 生成 JavaDoc 文档
      - name: Generate JavaDoc
        run: mvn javadoc:javadoc

      # 5. 上传构建产物 (可执行 jar 包)
      - name: Upload Build Artifact (JAR)
        uses: actions/upload-artifact@v4
        with:
          name: teedy-executable-jar
          path: target/*.jar

      # 6. 上传测试报告 (HTML格式)
      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-html
          path: target/surefire-reports/*.html
          if-no-files-found: ignore  # 如果没有html报告则忽略，防止报错

      # 7. 上传 JavaDoc 文档 (jar包格式)
      - name: Upload JavaDoc
        uses: actions/upload-artifact@v4
        with:
          name: javadoc-jar
          path: target/*-javadoc.jar
          if-no-files-found: ignore
